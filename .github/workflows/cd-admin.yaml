name: CD Admin

on:
    push:
      branches:
        - main
        - dev
      paths:
        - 'apps/admin/**'

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Deploy to AWS
jobs:
    deploy-api:
      runs-on: ubuntu-latest  
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0
        - uses: ./.github/actions/setup-pnpm-node
        - name: Lint API
          run: pnpm turbo lint --filter admin
        - name: Type-check API
          run: pnpm turbo type-check --filter admin
        - name: Build API
          run: pnpm turbo build --filter admin
        # - name: Deploy admin
        #   run: |
        #     pnpm turbo run deploy --filter admin