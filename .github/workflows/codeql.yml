name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 3 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    # Skipped until GitHub Advanced Security is enabled on the repo
    # (Settings → Security → Code security and analysis → Code scanning + GHAS).
    # To re-enable: delete this `if: false` line. The job will then run CodeQL
    # and upload results to the Security tab.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
