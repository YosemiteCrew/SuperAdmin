# SonarCloud configuration for Super Admin
sonar.host.url=https://sonarcloud.io
sonar.projectKey=YosemiteCrew_SuperAdmin
sonar.organization=yosemitecrew
sonar.projectName=Super Admin

# Source + test layout
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**/*.ts,**/__tests__/**/*.tsx,**/*.test.ts,**/*.test.tsx

# Exclusions for coverage.
# Route-level server components (page.tsx) and layouts are rendered/evaluated by
# Next at request time, not exercised by Jest unit tests — excluded here to match
# apps/admin/jest.config.ts `coveragePathIgnorePatterns`.
sonar.coverage.exclusions=**/__tests__/**,**/jest.mocks/**,**/constants/**,**/*.stories.*,**/e2e/**,**/.next/**,**/(routes)/**/page.tsx,**/(routes)/**/layout.tsx,**/(routes)/**/loading.tsx,**/app/auth/**/page.tsx,**/app/auth/layout.tsx,**/app/layout.tsx,**/services/http/types.ts,**/features/organizations/types.ts,**/features/audit/types.ts,**/components/supertokensProvider.tsx

# Exclude generated + build output from analysis entirely
sonar.exclusions=**/.next/**,**/node_modules/**,**/coverage/**,**/.turbo/**,**/dist/**,next-env.d.ts

# Tell Sonar where to find the lcov coverage report (produced by `pnpm test:coverage`)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Pin to our tsconfig so Sonar uses the same compiler options
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
