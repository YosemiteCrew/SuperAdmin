# SonarCloud configuration for Super Admin
sonar.projectKey=YosemiteCrew_Super-Admin
sonar.organization=yosemitecrew

# Source + test layout
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/__tests__/**/*.ts,**/__tests__/**/*.tsx,**/*.test.ts,**/*.test.tsx

# Exclusions for coverage.
# Next App Router entry files (page/layout/loading) are rendered/evaluated by Next
# at request time and are NOT collected by Jest (see jest.config.ts
# `coveragePathIgnorePatterns`), so lcov has no data for them — they must be
# excluded here too or Sonar scores them 0%. Simple `**/page.tsx` globs are used
# instead of `**/(routes)/**` because the literal route-group parens are not
# matched reliably by Sonar's wildcard matcher.
sonar.coverage.exclusions=**/__tests__/**,**/jest.mocks/**,**/constants/**,**/*.stories.*,**/e2e/**,**/.next/**,**/page.tsx,**/layout.tsx,**/loading.tsx,**/services/http/types.ts,**/features/organizations/types.ts,**/features/audit/types.ts,**/components/supertokensProvider.tsx

# Exclude generated + build output from analysis entirely
sonar.exclusions=**/.next/**,**/node_modules/**,**/coverage/**,**/.turbo/**,**/dist/**,next-env.d.ts

# Tell Sonar where to find the lcov coverage report (produced by `pnpm test:coverage`)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Pin to our tsconfig so Sonar uses the same compiler options
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
